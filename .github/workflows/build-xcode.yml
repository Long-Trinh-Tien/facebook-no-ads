name: Build Glow with Xcode Toolchain

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: qwen-glow

      - name: Download original Glow deb
        run: |
          curl -sL "https://github.com/dayanch96/Glow/releases/download/v1.3.1/com.dvntm.glow_1.3.1_iphoneos-arm.deb" -o /tmp/glow_orig.deb
          mkdir -p /tmp/glow_orig
          cd /tmp/glow_orig
          ar x /tmp/glow_orig.deb
          tar xf data.tar.lzma 2>/dev/null || tar xf data.tar.gz 2>/dev/null
          DYLIB=$(find . -name "*.dylib" | head -1)
          echo "Original dylib: $DYLIB"
          otool -l "$DYLIB" | grep -A2 "LC_VERSION_MIN" || true
          otool -l "$DYLIB" | grep -A2 "LC_BUILD_VERSION" || true

      - name: Build minimal dylib with Xcode clang
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK: $SDK"
          
          cat > /tmp/Tweak.x << 'SWIFT'
          #import <UIKit/UIKit.h>
          #import <dlfcn.h>
          
          static void loadPrefs() {
              @autoreleasepool {
                  NSString *path = @"/var/mobile/Library/Preferences/com.dvntm.glowprefs.plist";
                  NSMutableDictionary *prefs = [[NSMutableDictionary alloc] initWithContentsOfFile:path];
                  if (!prefs) prefs = [NSMutableDictionary new];
                  NSLog(@"[Glow] prefs loaded: %@", prefs);
              }
          }
          
          __attribute__((constructor))
          static void glow_init() {
              @autoreleasepool {
                  loadPrefs();
                  NSLog(@"[Glow] v1.3.1 loaded (Xcode build)");
              }
          }
          SWIFT
          
          clang -arch arm64 -miphoneos-version-min=14.0 \
            -isysroot "$SDK" \
            -fobjc-arc -dynamiclib \
            -framework UIKit -framework Foundation \
            -o /tmp/Glow.dylib /tmp/Tweak.x
          
          echo "=== Our dylib ==="
          otool -l /tmp/Glow.dylib | grep -A2 "LC_VERSION_MIN" || true
          otool -l /tmp/Glow.dylib | grep -A2 "LC_BUILD_VERSION" || true
          file /tmp/Glow.dylib
          ls -la /tmp/Glow.dylib

      - name: Compare flags
        run: |
          echo "=== Original ==="
          otool -l /tmp/glow_orig/Library/MobileSubstrate/DynamicLibraries/Glow.dylib | grep -E "(segname|flags)" | head -10
          echo "=== Ours ==="
          otool -l /tmp/Glow.dylib | grep -E "(segname|flags)" | head -10

      - name: Create deb package
        run: |
          mkdir -p /tmp/deb_pkg/Library/MobileSubstrate/DynamicLibraries
          mkdir -p /tmp/deb_pkg/Library/Application\ Support/Glow.bundle
          cp /tmp/Glow.dylib /tmp/deb_pkg/Library/MobileSubstrate/DynamicLibraries/
          
          # Create filter plist
          cat > /tmp/deb_pkg/Library/MobileSubstrate/DynamicLibraries/Glow.plist << 'PLIST'
          { Filter = { Bundles = ("com.facebook.Facebook"); }; }
          PLIST
          
          # Copy bundle from original
          cp -r /tmp/glow_orig/Library/Application\ Support/Glow.bundle/* "/tmp/deb_pkg/Library/Application Support/Glow.bundle/"
          
          # Create control
          mkdir -p /tmp/deb_pkg/DEBIAN
          cat > /tmp/deb_pkg/DEBIAN/control << 'CTRL'
          Package: com.dvntm.glow
          Name: Glow for Facebook
          Version: 1.3.1-xcode
          Architecture: iphoneos-arm
          Description: Glow rebuilt with Xcode toolchain
          Maintainer: dvntm
          Depends: mobilesubstrate (>= 0.9.5000)
          CTRL
          
          cd /tmp && dpkg-deb -b deb_pkg com.dvntm.glow_1.3.1-xcode_iphoneos-arm.deb
          ls -la /tmp/com.dvntm.glow_1.3.1-xcode_iphoneos-arm.deb

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: glow-xcode-deb
          path: /tmp/com.dvntm.glow_1.3.1-xcode_iphoneos-arm.deb
