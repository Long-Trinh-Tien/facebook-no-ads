name: Analyze Original Glow Structure

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download original Glow from our release
        run: |
          gh release download glow-original --repo Long-Trinh-Tien/facebook-no-ads
          ls -la glow.deb
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Extract dylib
        run: |
          mkdir -p /tmp/glow_out
          cd /tmp/glow_out
          ar x ${{ github.workspace }}/glow.deb
          # Handle lzma compression
          if [ -f data.tar.lzma ]; then
            brew install xz 2>/dev/null || true
            lzma -d data.tar.lzma
            tar xf data.tar
          elif [ -f data.tar.xz ]; then
            tar xf data.tar.xz
          elif [ -f data.tar.gz ]; then
            tar xf data.tar.gz
          elif [ -f data.tar.zst ]; then
            tar xf data.tar.zst
          fi
          GLOW=$(find /tmp/glow_out -name "Glow.dylib" 2>/dev/null | head -1)
          echo "GLOW=$GLOW" >> $GITHUB_ENV

      - name: Install jtool2
        run: |
          brew install jtool2 2>/dev/null || true
          which jtool2 || echo "jtool2 not found"

      - name: Full analysis
        run: |
          GLOW="${{ env.GLOW }}"
          echo "Analyzing: $GLOW"
          ls -la "$GLOW"
          
          mkdir -p /tmp/results
          
          file "$GLOW" > /tmp/results/fileinfo.txt
          otool -L "$GLOW" > /tmp/results/libraries.txt
          otool -l "$GLOW" > /tmp/results/loadcmds.txt
          
          nm -gU "$GLOW" > /tmp/results/exported_syms.txt 2>&1
          nm -u "$GLOW" | sort > /tmp/results/imported_syms.txt 2>&1
          nm "$GLOW" | grep _OBJC_CLASS > /tmp/results/objc_classes.txt 2>&1
          
          strings "$GLOW" > /tmp/results/strings.txt 2>&1
          strings "$GLOW" | grep -E '^[a-z].+:$' | sort -u > /tmp/results/selectors.txt 2>&1
          
          jtool2 --objc "$GLOW" > /tmp/results/objc_dump.txt 2>&1 || true
          
          jtool2 -d __text "$GLOW" 2>/dev/null | head -3000 > /tmp/results/disasm_header.txt
          jtool2 -d __text "$GLOW" 2>/dev/null | tail -3000 > /tmp/results/disasm_tail.txt
          
          jtool2 --analyze "$GLOW" 2>/dev/null > /tmp/results/analyze.txt || true
          
          nm -u "$GLOW" | grep -i "hook\|substrate\|MSHook\|logos\|method_set\|class_replace\|class_addMethod" \
            > /tmp/results/hook_imports.txt 2>&1 || echo "none found" > /tmp/results/hook_imports.txt
          
          echo "complete" > /tmp/results/complete.txt

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: glow-original-analysis
          path: /tmp/results/
