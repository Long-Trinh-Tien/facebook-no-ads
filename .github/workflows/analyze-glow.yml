name: Deep Glow.dylib RE

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Glow.dylib from release
        run: |
          gh release download glow-original --repo Long-Trinh-Tien/facebook-no-ads \
            --pattern 'Glow.dylib' --dir /tmp/glow
          ls -la /tmp/glow/Glow.dylib
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install tools
        run: |
          brew install jtool2 2>/dev/null || true
          # Install dsdump for ObjC class dump
          pip3 install dsdump 2>/dev/null || true

      - name: RE-1 ObjC class-dump
        run: |
          mkdir -p /tmp/results
          GLOW=/tmp/glow/Glow.dylib

          # 1. dsdump (best for ObjC/Swift)
          which dsdump && dsdump "$GLOW" > /tmp/results/dsdump.txt 2>&1 || echo "no dsdump"

          # 2. jtool2 ObjC dump (try different flags)
          jtool2 --objc "$GLOW" > /tmp/results/jtool2_objc.txt 2>&1 || true
          jtool2 -arch arm64 -d objc "$GLOW" > /tmp/results/jtool2_objc_v2.txt 2>&1 || true
          
          # 3. nm class list (fallback)
          nm "$GLOW" | grep _OBJC_CLASS_ | grep -v '_\$_\$\|_NS\|_UI\|_PH\|_AV\|_CA\|_LS' > /tmp/results/class_list.txt

      - name: RE-2 ObjC metadata
        run: |
          GLOW=/tmp/glow/Glow.dylib
          otool -oV "$GLOW" > /tmp/results/otool_ov.txt 2>&1 || true
          otool -v -s __TEXT __objc_methtype "$GLOW" > /tmp/results/methtypes.txt 2>&1 || true
          otool -v -s __DATA_CONST __cfstring "$GLOW" > /tmp/results/cfstrings.txt 2>&1 || true
          otool -v -s __DATA __objc_const "$GLOW" > /tmp/results/objc_const.txt 2>&1 || true
          otool -v -s __DATA __objc_selrefs "$GLOW" > /tmp/results/selrefs.txt 2>&1 || true

      - name: RE-3 Constructor disassembly
        run: |
          GLOW=/tmp/glow/Glow.dylib
          
          # Find constructor address from __init_offsets
          CTOR=$(python3 -c "
          import struct
          with open('$GLOW', 'rb') as f:
              f.seek(0xb1c0)
              val = struct.unpack('<I', f.read(4))[0]
              print(f'{0x4000 + val:x}')
          ")
          echo "Constructor at: 0x$CTOR" > /tmp/results/ctor_info.txt
          
          # Disassemble constructor using otool -tV (the whole function)
          # Get the function length from disassembly and extract it
          FULL_DISASM=$(otool -tV "$GLOW" 2>/dev/null)
          echo "$FULL_DISASM" | awk '/^'$CTOR':/,/ret|blr|^[0-9a-f]+:/' | head -200 > /tmp/results/ctor_disasm.txt
          
          echo "Full disassembly size: $(echo "$FULL_DISASM" | wc -l) lines" > /tmp/results/disasm_stats.txt
          
          # Also try jtool2 for the constructor specifically
          jtool2 -d __text "$GLOW" 2>/dev/null | grep -A 300 "0x$CTOR" | head -200 > /tmp/results/ctor_jtool2.txt

      - name: RE-4 List all Glow-specific methods with addresses
        run: |
          GLOW=/tmp/glow/Glow.dylib
          
          python3 << 'PYEOF'
          import subprocess
          
          GLOW = '/tmp/glow/Glow.dylib'
          
          # Get full disassembly
          result = subprocess.run(['otool', '-tV', GLOW], capture_output=True, text=True, timeout=120)
          disasm = result.stdout
          
          # Get nm output for Glow's own symbols
          result2 = subprocess.run(['nm', GLOW], capture_output=True, text=True, timeout=30)
          
          # Parse nm for Glow's own methods (no UIKit/Foundation)
          methods = []
          for line in result2.stdout.split('\n'):
              parts = line.strip().split()
              if len(parts) < 3: continue
              addr_str, sym_type, name = parts[0], parts[1], ' '.join(parts[2:])
              if sym_type != 'T': continue
              if '-[' in name and not any(x in name for x in ['UIView', 'UIButton', 'UIViewController', 'NSObject', 'NSString', 'UIColor', 'UIFont', 'UIScreen', 'UITable']):
                  # Get the function disassembly
                  addr = int(addr_str, 16)
                  in_func = False
                  func_lines = []
                  for line2 in disasm.split('\n'):
                      stripped = line2.strip()
                      if stripped.startswith(addr_str):
                          in_func = True
                      if in_func:
                          func_lines.append(stripped)
                          if len(func_lines) > 60:
                              break
                  
                  methods.append((addr, name, func_lines))
          
          with open('/tmp/results/glow_methods.txt', 'w') as f:
              for addr, name, lines in methods:
                  f.write(f"0x{addr:x} {name}\n")
          
          # Also write disassembly for methods
          with open('/tmp/results/glow_methods_disasm.txt', 'w') as f:
              for addr, name, lines in methods:
                  f.write(f"\n{'='*60}\n")
                  f.write(f"0x{addr:x} {name}\n")
                  f.write(f"{'='*60}\n")
                  for line in lines[:50]:
                      f.write(line + '\n')
          
          print(f"Found {len(methods)} Glow-specific methods")
          for addr, name, _ in methods[:20]:
              print(f"  0x{addr:x} {name}")
          PYEOF

      - name: RE-5 Extract FB selectors
        run: |
          GLOW=/tmp/glow/Glow.dylib
          
          echo "=== FB selectors ===" > /tmp/results/fb_selectors.txt
          strings "$GLOW" | grep -E "^(_canMark|MarkStory|_markThread|storyBucket|initWithFB|initWithPando|tabbarHeight|performLike|advanceTo|downloadMedia|extractURL|buttonFor|videoURL|playableURL|mediaObject|isStory|setIsStory)" | sort -u >> /tmp/results/fb_selectors.txt

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: glow-deep-re
          path: /tmp/results/
