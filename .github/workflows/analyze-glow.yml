name: Analyze Glow Original

on:
  workflow_dispatch:
  push:
    branches: [ "analyze" ]

jobs:
  analyze:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find Glow dylib
        run: |
          # Download the original dylib artifact
          find . -name "Glow_original.dylib" -type f 2>/dev/null || true

      - name: Install tools
        run: |
          brew install jtool2 2>/dev/null || true

      - name: Phase A — Imports (nm)
        run: |
          DYLIB=$(find /tmp -name "Glow_original.dylib" 2>/dev/null || find . -name "Glow_original.dylib" 2>/dev/null)
          if [ -z "$DYLIB" ]; then
            ls -la /tmp/*.dylib
            exit 1
          fi
          
          echo "=== SIZE ==="
          ls -la "$DYLIB"
          
          echo ""
          echo "=== FAT HEADERS ==="
          lipo -info "$DYLIB" 2>/dev/null || echo "not fat"
          
          echo ""
          echo "=== ALL IMPORTS (nm -gU) ==="
          nm -gU "$DYLIB" | sort > /tmp/imports.txt
          cat /tmp/imports.txt
          
          echo ""
          echo "=== EXPORTS (nm -g) ==="
          nm -g "$DYLIB" | sort > /tmp/exports.txt
          head -50 /tmp/exports.txt
          
          echo ""
          echo "=== OBJC CLASSES (nm) ==="
          nm "$DYLIB" | grep -E "OBJC_CLASS" | sort -u

      - name: Phase A — Section analysis (otool)
        run: |
          DYLIB=$(find /tmp -name "Glow_original.dylib" 2>/dev/null || find . -name "Glow_original.dylib" 2>/dev/null)
          
          echo "=== LOAD COMMANDS ==="
          otool -l "$DYLIB" | head -200
          
          echo ""
          echo "=== SECTIONS ==="
          otool -l "$DYLIB" | grep -E "(sectname|segname|size|addr|offset)" | head -80
          
          echo ""
          echo "=== LINKED LIBRARIES ==="
          otool -L "$DYLIB"

      - name: Phase A — Constructors (otool -ov)
        run: |
          DYLIB=$(find /tmp -name "Glow_original.dylib" 2>/dev/null || find . -name "Glow_original.dylib" 2>/dev/null)
          
          echo "=== MOD_INIT_FUNC ==="
          otool -l "$DYLIB" | grep -A5 "mod_init_func"
          
          echo ""
          echo "=== OBJC IMAGE INFO ==="
          otool -ov "$DYLIB" | head -50
          
          echo ""
          echo "=== ALL OBJC METHODS ==="
          otool -ov "$DYLIB" | grep -E "(Method name|Instance method|Class method|0x[0-9a-f]+)" | head -100

      - name: Phase A — ObjC class list
        run: |
          DYLIB=$(find /tmp -name "Glow_original.dylib" 2>/dev/null || find . -name "Glow_original.dylib" 2>/dev/null)
          
          echo "=== ALL OBJC CLASSES ==="
          otool -ov "$DYLIB" | grep -E "Contents of.*class" | head -200
          
          echo ""
          echo "=== CLASS NAMES ==="
          otool -ov "$DYLIB" | grep "class name" | sort -u

      - name: Phase A — Strings dump
        run: |
          DYLIB=$(find /tmp -name "Glow_original.dylib" 2>/dev/null || find . -name "Glow_original.dylib" 2>/dev/null)
          
          echo "=== FB-CLASS STRINGS ==="
          strings "$DYLIB" | grep -iE "(FBAssets|FBFeed|FBAds|FBNativeAd|FBAd|FBActivity|FBPando|FBTree|FBFriend|FBStory|FBVideo|FBPhoto|FBComment|FBReaction|FBGroup|FBPage|FBPost|FBProfile|FBInFeed|FBStoryView|FBMedia)" | sort -u | head -50
          
          echo ""
          echo "=== UIKIT STRINGS ==="
          strings "$DYLIB" | grep -iE "(tabBar|navigationBar|navBar|statusBar|UIWindow|UIView|UIAlert|UIButton|UILabel|UITableView)" | sort -u | head -50
          
          echo ""
          echo "=== GLOW-SPECIFIC ==="
          strings "$DYLIB" | grep -iE "(glow|Glow|GLOW)" | sort -u | head -50

      - name: Phase A — Full output save
        run: |
          DYLIB=$(find /tmp -name "Glow_original.dylib" 2>/dev/null || find . -name "Glow_original.dylib" 2>/dev/null)
          
          mkdir -p /tmp/glow_analysis
          nm -gU "$DYLIB" > /tmp/glow_analysis/imported_syms.txt 2>&1
          nm -g "$DYLIB" > /tmp/glow_analysis/exported_syms.txt 2>&1
          otool -ov "$DYLIB" > /tmp/glow_analysis/otool_ov_full.txt 2>&1
          otool -L "$DYLIB" > /tmp/glow_analysis/otool_L.txt 2>&1
          otool -l "$DYLIB" > /tmp/glow_analysis/otool_l_full.txt 2>&1
          strings "$DYLIB" > /tmp/glow_analysis/strings_full.txt 2>&1
          strings "$DYLIB" | grep "^_OBJC_CLASS_\|^_OBJC_METACLASS_" > /tmp/glow_analysis/objc_classes.txt 2>&1
          jtool2 -S "$DYLIB" > /tmp/glow_analysis/jtool2_S.txt 2>&1 || echo "jtool2 failed"
          
          tar czf /tmp/glow_analysis.tar.gz -C /tmp glow_analysis/
          echo "Analysis saved to /tmp/glow_analysis.tar.gz"

      - name: Upload analysis
        uses: actions/upload-artifact@v4
        with:
          name: glow-analysis
          path: /tmp/glow_analysis.tar.gz

      - name: Upload deploy artifact for download
        uses: actions/upload-artifact@v4
        with:
          name: glow-analysis-flat
          path: /tmp/glow_analysis/
