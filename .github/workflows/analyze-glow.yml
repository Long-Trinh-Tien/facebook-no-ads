name: Analyze Original Glow Structure

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download original Glow deb from GitHub release
        run: |
          curl -sL -o /tmp/glow.deb \
            "https://github.com/dayanch96/Glow/releases/download/v1.3.1/com.dayanch96.glow_1.3.1_iphoneos-arm.deb"
          ls -la /tmp/glow.deb
          file /tmp/glow.deb

      - name: Extract dylib from deb
        run: |
          mkdir -p /tmp/glow_out
          cd /tmp/glow_out
          ar x /tmp/glow.deb
          ls -la
          # Find data archive
          for f in data.tar.*; do
            echo "Extracting $f..."
            tar xf "$f" 2>/dev/null && break
          done
          find . -name "*.dylib" 2>/dev/null

      - name: Install jtool2
        run: |
          brew install jtool2 2>/dev/null || echo "brew failed, trying pip"
          sudo pip3 install --quiet jtool2 2>/dev/null || true

      - name: Full analysis
        run: |
          GLOW=$(find /tmp/glow_out -name "*.dylib" 2>/dev/null | head -1)
          if [ -z "$GLOW" ] || [ ! -f "$GLOW" ]; then
            # Try alternative paths
            GLOW=$(find /tmp/glow_out -name "glow*" 2>/dev/null | head -1)
          fi
          echo "GLOW dylib: $GLOW"
          ls -la "$GLOW"
          
          mkdir -p /tmp/results
          
          # 1. Basic info
          file "$GLOW" > /tmp/results/fileinfo.txt
          otool -L "$GLOW" > /tmp/results/libraries.txt
          otool -l "$GLOW" > /tmp/results/loadcmds.txt
          
          # 2. Symbols
          nm -gU "$GLOW" > /tmp/results/exported_syms.txt
          nm -u "$GLOW" | sort > /tmp/results/imported_syms.txt
          nm "$GLOW" | grep _OBJC_CLASS > /tmp/results/objc_classes.txt
          
          # 3. Strings
          strings "$GLOW" > /tmp/results/strings.txt
          strings "$GLOW" | grep -E '^[a-z].+:$' | sort -u > /tmp/results/selectors.txt
          
          # 4. ObjC metadata
          jtool2 --objc "$GLOW" > /tmp/results/objc_dump.txt 2>&1 || true
          
          # 5. Disassembly of __text section (first 5000 lines)
          jtool2 -d __text "$GLOW" 2>/dev/null | head -5000 > /tmp/results/disasm.txt
          
          # 6. Try class-dump
          which class-dump && class-dump "$GLOW" > /tmp/results/classdump.txt 2>&1 || echo "class-dump not available" > /tmp/results/classdump.txt
          
          # 7. Check for MSHookMessageEx or any hooking mechanism
          nm -u "$GLOW" | grep -i "hook\|substrate\|MSHook\|logos" > /tmp/results/hook_imports.txt || echo "none found" > /tmp/results/hook_imports.txt
          
          echo "Analysis complete" > /tmp/results/complete.txt

      - name: Upload analysis results
        uses: actions/upload-artifact@v4
        with:
          name: glow-original-analysis
          path: /tmp/results/
