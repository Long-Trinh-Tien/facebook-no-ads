name: Deep Analysis Glow vs Clone

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download original Glow deb
        run: |
          curl -sL "https://github.com/dayanch96/Glow/releases/download/v1.3.1/com.dvntm.glow_1.3.1_iphoneos-arm.deb" -o /tmp/glow_orig.deb
          mkdir -p /tmp/glow_orig
          cd /tmp/glow_orig
          ar x /tmp/glow_orig.deb
          tar xf data.tar.lzma 2>/dev/null || tar xf data.tar.gz 2>/dev/null

      - name: Setup Theos and build clone
        uses: waruhachi/theos-action@v2.4.6

      - name: Build minimal clone
        run: |
          cd glow-from-source
          rm -rf .theos packages
          make clean package FINALPACKAGE=1
          DEB=$(find packages -name "*.deb" | head -1)
          mkdir -p /tmp/glow_clone
          cd /tmp/glow_clone
          ar x "$GITHUB_WORKSPACE/glow-from-source/$DEB"
          tar xf data.tar.lzma 2>/dev/null || tar xf data.tar.gz 2>/dev/null

      - name: Full comparison
        run: |
          DYLIB_ORIG=$(find /tmp/glow_orig -name "*.dylib" | head -1)
          DYLIB_CLONE=$(find /tmp/glow_clone -name "*.dylib" | head -1)
          
          mkdir -p /tmp/comparison
          
          echo "=== FILE INFO ===" > /tmp/comparison/report.txt
          echo "Original: $(file "$DYLIB_ORIG")" >> /tmp/comparison/report.txt
          echo "Clone: $(file "$DYLIB_CLONE")" >> /tmp/comparison/report.txt
          echo "" >> /tmp/comparison/report.txt
          
          echo "=== LOAD COMMANDS ===" >> /tmp/comparison/report.txt
          echo "--- Original ---" >> /tmp/comparison/report.txt
          otool -l "$DYLIB_ORIG" >> /tmp/comparison/orig_load.txt 2>&1
          echo "--- Clone ---" >> /tmp/comparison/report.txt
          otool -l "$DYLIB_CLONE" >> /tmp/comparison/clone_load.txt 2>&1
          
          echo "=== LINKED LIBS ===" >> /tmp/comparison/report.txt
          echo "--- Original ---" >> /tmp/comparison/report.txt
          otool -L "$DYLIB_ORIG" >> /tmp/comparison/report.txt 2>&1
          echo "--- Clone ---" >> /tmp/comparison/report.txt
          otool -L "$DYLIB_CLONE" >> /tmp/comparison/report.txt 2>&1
          
          echo "=== UNDEFINED SYMBOLS ===" >> /tmp/comparison/report.txt
          echo "--- Original ---" >> /tmp/comparison/report.txt
          nm -u "$DYLIB_ORIG" | sort > /tmp/comparison/orig_undef.txt 2>&1
          echo "--- Clone ---" >> /tmp/comparison/report.txt
          nm -u "$DYLIB_CLONE" | sort > /tmp/comparison/clone_undef.txt 2>&1
          
          echo "=== SYMBOLS IN ORIGINAL BUT NOT IN CLONE ===" >> /tmp/comparison/report.txt
          comm -23 /tmp/comparison/orig_undef.txt /tmp/comparison/clone_undef.txt >> /tmp/comparison/report.txt 2>&1
          echo "" >> /tmp/comparison/report.txt
          echo "=== SYMBOLS IN CLONE BUT NOT IN ORIGINAL ===" >> /tmp/comparison/report.txt
          comm -13 /tmp/comparison/orig_undef.txt /tmp/comparison/clone_undef.txt >> /tmp/comparison/report.txt 2>&1
          
          echo "=== OBJC SECTIONS ===" >> /tmp/comparison/report.txt
          otool -ov "$DYLIB_ORIG" > /tmp/comparison/orig_objc.txt 2>&1
          otool -ov "$DYLIB_CLONE" > /tmp/comparison/clone_objc.txt 2>&1
          
          cat /tmp/comparison/report.txt
          echo ""
          echo "=== FILES CREATED ==="
          ls -la /tmp/comparison/

      - name: Upload comparison
        uses: actions/upload-artifact@v4
        with:
          name: glow-deep-comparison
          path: /tmp/comparison/**
