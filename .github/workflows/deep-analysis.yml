name: Deep Analysis Glow vs Clone

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download original Glow deb
        run: |
          curl -sL "https://github.com/dayanch96/Glow/releases/download/v1.3.1/com.dvntm.glow_1.3.1_iphoneos-arm.deb" -o /tmp/glow_orig.deb
          mkdir -p /tmp/glow_orig
          cd /tmp/glow_orig
          ar x /tmp/glow_orig.deb
          tar xf data.tar.lzma 2>/dev/null || tar xf data.tar.gz 2>/dev/null
          DYLIB_ORIG=$(find . -name "*.dylib" | head -1)
          echo "Original: $DYLIB_ORIG"

      - name: Setup Theos and build clone
        uses: waruhachi/theos-action@v2.4.6

      - name: Build minimal clone
        run: |
          cd glow-from-source
          rm -rf .theos packages
          make clean package FINALPACKAGE=1
          DEB=$(find packages -name "*.deb" | head -1)
          mkdir -p /tmp/glow_clone
          cd /tmp/glow_clone
          ar x "$GITHUB_WORKSPACE/glow-from-source/$DEB"
          tar xf data.tar.lzma 2>/dev/null || tar xf data.tar.gz 2>/dev/null
          DYLIB_CLONE=$(find . -name "*.dylib" | head -1)
          echo "Clone: $DYLIB_CLONE"

      - name: Compare __mod_init_func (constructors)
        run: |
          DYLIB_ORIG=$(find /tmp/glow_orig -name "*.dylib" | head -1)
          DYLIB_CLONE=$(find /tmp/glow_clone -name "*.dylib" | head -1)
          
          echo "=== ORIGINAL __mod_init_func ==="
          otool -l "$DYLIB_ORIG" | grep -A10 "__mod_init_func"
          echo ""
          echo "=== CLONE __mod_init_func ==="
          otool -l "$DYLIB_CLONE" | grep -A10 "__mod_init_func"

      - name: Compare TLV descriptors
        run: |
          DYLIB_ORIG=$(find /tmp/glow_orig -name "*.dylib" | head -1)
          DYLIB_CLONE=$(find /tmp/glow_clone -name "*.dylib" | head -1)
          
          echo "=== ORIGINAL TLV ==="
          otool -l "$DYLIB_ORIG" | grep -A10 "__thread_vars" || echo "No TLV"
          otool -l "$DYLIB_ORIG" | grep "TLV" || echo "No TLV references"
          echo ""
          echo "=== CLONE TLV ==="
          otool -l "$DYLIB_CLONE" | grep -A10 "__thread_vars" || echo "No TLV"
          otool -l "$DYLIB_CLONE" | grep "TLV" || echo "No TLV references"

      - name: Compare all load commands
        run: |
          DYLIB_ORIG=$(find /tmp/glow_orig -name "*.dylib" | head -1)
          DYLIB_CLONE=$(find /tmp/glow_clone -name "*.dylib" | head -1)
          
          echo "=== ORIGINAL load commands ==="
          otool -l "$DYLIB_ORIG" 2>&1 | grep "cmd " | sort
          echo ""
          echo "=== CLONE load commands ==="
          otool -l "$DYLIB_CLONE" 2>&1 | grep "cmd " | sort

      - name: Compare symbols (undefined/imports)
        run: |
          DYLIB_ORIG=$(find /tmp/glow_orig -name "*.dylib" | head -1)
          DYLIB_CLONE=$(find /tmp/glow_clone -name "*.dylib" | head -1)
          
          echo "=== ORIGINAL undefined ==="
          nm -u "$DYLIB_ORIG" | sort > /tmp/orig_undef.txt
          cat /tmp/orig_undef.txt
          echo ""
          echo "=== CLONE undefined ==="
          nm -u "$DYLIB_CLONE" | sort > /tmp/clone_undef.txt
          cat /tmp/clone_undef.txt
          echo ""
          echo "=== DIFF (in original but NOT in clone) ==="
          comm -23 /tmp/orig_undef.txt /tmp/clone_undef.txt
          echo ""
          echo "=== DIFF (in clone but NOT in original) ==="
          comm -13 /tmp/orig_undef.txt /tmp/clone_undef.txt

      - name: Compare __const data
        run: |
          DYLIB_ORIG=$(find /tmp/glow_orig -name "*.dylib" | head -1)
          DYLIB_CLONE=$(find /tmp/glow_clone -name "*.dylib" | head -1)
          
          echo "=== ORIGINAL __const ==="
          otool -v -s __DATA __const "$DYLIB_ORIG" 2>&1 | head -50
          echo ""
          echo "=== CLONE __const ==="
          otool -v -s __DATA __const "$DYLIB_CLONE" 2>&1 | head -50

      - name: Compare __cfstring section
        run: |
          DYLIB_ORIG=$(find /tmp/glow_orig -name "*.dylib" | head -1)
          DYLIB_CLONE=$(find /tmp/glow_clone -name "*.dylib" | head -1)
          
          echo "=== ORIGINAL __cfstring ==="
          otool -v -s __DATA __cfstring "$DYLIB_ORIG" 2>&1 | head -50
          echo ""
          echo "=== CLONE __cfstring ==="
          otool -v -s __DATA __cfstring "$DYLIB_CLONE" 2>&1 | head -50

      - name: Upload comparison
        uses: actions/upload-artifact@v4
        with:
          name: glow-vs-clone-comparison
          path: |
            /tmp/orig_undef.txt
            /tmp/clone_undef.txt
