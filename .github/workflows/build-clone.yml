name: Build Glow Clone (Xcode)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download original Glow deb
        run: |
          curl -sL "https://github.com/dayanch96/Glow/releases/download/v1.3.1/com.dvntm.glow_1.3.1_iphoneos-arm.deb" -o /tmp/glow_orig.deb
          mkdir -p /tmp/glow_orig
          cd /tmp/glow_orig
          ar x /tmp/glow_orig.deb
          tar xf data.tar.lzma 2>/dev/null || tar xf data.tar.gz 2>/dev/null

      - name: Setup Theos
        uses: waruhachi/theos-action@v2.4.6

      - name: Build Glow clone with Theos on macOS
        run: |
          cd glow-from-source
          rm -rf .theos packages
          make clean package FINALPACKAGE=1
          echo "=== Built package ==="
          ls -la packages/*.deb

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: glow-clone-deb
          path: glow-from-source/packages/com.dvntm.glow_1.3.1_iphoneos-arm.deb

      - name: Verify dylib
        run: |
          DEB=glow-from-source/packages/com.dvntm.glow_1.3.1_iphoneos-arm.deb
          mkdir -p /tmp/verify_deb && cd /tmp/verify_deb
          ar x "$GITHUB_WORKSPACE/$DEB"
          tar xf data.tar.lzma 2>/dev/null || tar xf data.tar.gz 2>/dev/null
          DYLIB=$(find . -name "*.dylib" | head -1)
          echo "=== Dylib info ==="
          file "$DYLIB"
          otool -l "$DYLIB" | grep -A2 "LC_BUILD_VERSION" || true
          otool -L "$DYLIB" | head -20
