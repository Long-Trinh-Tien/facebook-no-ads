name: Analyze FB 560.x IPA Classes

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew install class-dump 2>/dev/null || true

      - name: Download FB IPA
        run: |
          # IPA too large for repo, need manual upload to release
          # For now, check if available
          gh release download fb-560-ipa --repo Long-Trinh-Tien/facebook-no-ads \
            --pattern 'facebook.ipa' --dir /tmp/fb 2>/dev/null || \
            echo "No IPA release found. Create release 'fb-560-ipa' with facebook.ipa"
          ls -la /tmp/fb/ 2>/dev/null
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Extract IPA
        if: hashFiles('/tmp/fb/facebook.ipa') != ''
        run: |
          mkdir -p /tmp/fb/extracted
          unzip -o /tmp/fb/facebook.ipa -d /tmp/fb/extracted/
          echo "Extracted to /tmp/fb/extracted"
          ls -la /tmp/fb/extracted/Payload/Facebook.app/Frameworks/ 2>/dev/null | head -10

      - name: RE-5: class-dump FB main binary
        if: hashFiles('/tmp/fb/extracted') != ''
        run: |
          mkdir -p /tmp/results

          class-dump /tmp/fb/extracted/Payload/Facebook.app/Facebook \
            > /tmp/results/fb_main_class_dump.txt 2>&1 || true
          
          echo "=== Main binary classes (Story/Seen/Reel/Feed/Ad) ==="
          grep -E "@interface\s+(FB|\w*Story|\w*Seen|\w*Reel|\w*Feed|\w*Ad|\w*Sponsored|\w*Download|\w*Like)" \
            /tmp/results/fb_main_class_dump.txt | head -50

      - name: RE-6: class-dump FBSharedFramework
        if: hashFiles('/tmp/fb/extracted') != ''
        run: |
          FBSHARED=/tmp/fb/extracted/Payload/Facebook.app/Frameworks/FBSharedFramework.framework/FBSharedFramework
          
          if [ -f "$FBSHARED" ]; then
            class-dump "$FBSHARED" > /tmp/results/fbshared_class_dump.txt 2>&1 || true
            
            echo "=== Target classes (Story/Seen/Reel) ==="
            grep -E "@interface\s+(FBSnacks|FBStory|FBReel|FBFeed|FBAd|FBSpon)" \
              /tmp/results/fbshared_class_dump.txt | head -50
            
            echo ""
            echo "=== Seen-related methods ==="
            grep -E "(canMark|markSeen|sendSeen|markThread|SeenState|Bucket)" \
              /tmp/results/fbshared_class_dump.txt | head -30
            
            echo ""
            echo "=== Download-related methods ==="
            grep -E "(videoURL|playableURL|HDPlayback|SDPlayback|download|save)" \
              /tmp/results/fbshared_class_dump.txt | head -30
            
            echo ""
            echo "=== Like/Interaction methods ==="
            grep -E "(performLike|likeAction|ConfirmLike|ReelsLike)" \
              /tmp/results/fbshared_class_dump.txt | head -20
            
            echo ""
            echo "=== Auto-advance methods ==="
            grep -E "(advanceToNext|autoAdvance|nextItem|navigationAction)" \
              /tmp/results/fbshared_class_dump.txt | head -20
            
            echo ""
            echo "=== Ad/PYMK/Recs methods ==="
            grep -E "(isSponsored|isAd|sponsoredData|category|FBTree|PandoTree)" \
              /tmp/results/fbshared_class_dump.txt | head -20
          else
            echo "FBSharedFramework not found at $FBSHARED"
          fi

      - name: RE-7: Extract method type encodings from FB
        if: hashFiles('/tmp/fb/extracted') != ''
        run: |
          FB=/tmp/fb/extracted/Payload/Facebook.app/Facebook
          
          echo "=== Seen-related selectors ==="
          strings "$FB" | grep -E "^_sendSeenThread|^_markThreadAsSeen|^_canMarkStory|^MarkStoryAsSeen|^markThreadAsSeen" | sort -u | head -20
          
          echo ""
          echo "=== Download-related selectors ==="
          strings "$FB" | grep -E "^videoURL|^playableURL|^HDPlayback|^SDPlayback|^download" | sort -u | head -20
          
          echo ""
          echo "=== Like selectors ==="
          strings "$FB" | grep -E "^performLike|^likeAction|^confirmLike" | sort -u | head -20
          
          echo ""
          echo "=== Auto-advance selectors ==="
          strings "$FB" | grep -E "^advanceToNext|^nextItem" | sort -u | head -20

      - name: Upload results
        if: hashFiles('/tmp/results') != ''
        uses: actions/upload-artifact@v4
        with:
          name: fb-560-class-analysis
          path: /tmp/results/
