name: Analyze FB 560.x IPA Classes

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  analyze:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew install jtool2 2>/dev/null || true

      - name: Download FB IPA from release
        run: |
          gh release download fb-560-ipa --repo Long-Trinh-Tien/facebook-no-ads \
            --pattern 'facebook.ipa' --dir /tmp/fb 2>/dev/null || \
            echo "No IPA release found"
          ls -la /tmp/fb/ 2>/dev/null
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Extract IPA
        if: hashFiles('/tmp/fb/facebook.ipa') != ''
        run: |
          mkdir -p /tmp/fb/extracted
          unzip -o /tmp/fb/facebook.ipa -d /tmp/fb/extracted/
          mkdir -p /tmp/results

      - name: RE-5: Analyze FB main binary (strings + selectors)
        if: hashFiles('/tmp/fb/extracted') != ''
        run: |
          FB=/tmp/fb/extracted/Payload/Facebook.app/Facebook
          mkdir -p /tmp/results

          # Strings search for FB classes and selectors
          strings "$FB" | grep -E "^FB[A-Z]" | sort -u > /tmp/results/fb_classnames.txt
          echo "=== FB class names (sample) ==="
          head -30 /tmp/results/fb_classnames.txt

          echo ""
          echo "=== Seen-related selectors ==="
          strings "$FB" | grep -E "^_sendSeen|^_markThread|^_canMark|^MarkStory|^markThread|^seenState|^SeenState" | sort -u | head -30

          echo ""
          echo "=== Download-related selectors ==="
          strings "$FB" | grep -E "^videoURL|^playableURL|^HDPlayback|^SDPlayback|^download" | sort -u | head -30

          echo ""
          echo "=== Like/Interaction selectors ==="
          strings "$FB" | grep -E "^performLike|^likeAction|^confirmLike|^advanceToNext|^nextItem" | sort -u | head -20

          echo ""
          echo "=== Ad/PYMK selectors ==="
          strings "$FB" | grep -E "^isSponsored|^isAd|^sponsoredData|^initWithFB|^initWithPando|^category" | sort -u | head -20

          echo ""
          echo "=== Story/Reel classes ==="
          grep -E "Story|Reel|Snack|Bucket|Seen" /tmp/results/fb_classnames.txt | sort -u | head -30

      - name: RE-6: Analyze FBSharedFramework
        if: hashFiles('/tmp/fb/extracted') != ''
        run: |
          FWS=/tmp/fb/extracted/Payload/Facebook.app/Frameworks/FBSharedFramework.framework/FBSharedFramework
          if [ ! -f "$FWS" ]; then
            echo "FBSharedFramework not found, trying FBSharedDynamicFramework"
            FWS=/tmp/fb/extracted/Payload/Facebook.app/Frameworks/FBSharedDynamicFramework.framework/FBSharedDynamicFramework
          fi

          if [ -f "$FWS" ]; then
            echo "=== Analyzing: $FWS ==="
            
            # ObjC class metadata via jtool2
            jtool2 --objc "$FWS" 2>/dev/null | head -500 > /tmp/results/fbshared_objc.txt || true
            
            # String-based class search
            strings "$FWS" | grep -E "^FBSnacks|^FBStory|^FBReel|^FBFeed|^FBAd|^FBSpon|^FBMem" | sort -u \
              > /tmp/results/fbshared_classes.txt
            
            echo "=== Target classes (Story/Seen/Reel) ==="
            grep -E "Story|Seen|Reel|Snack|Bucket" /tmp/results/fbshared_classes.txt | sort -u | head -50
            
            echo ""
            echo "=== Method selectors in FBSharedFramework ==="
            strings "$FWS" | grep -E '^[a-z].+:$' | grep -E "seen|mark|download|story|reel|like|next|advance|sponsored|ad" | sort -u \
              > /tmp/results/fbshared_selectors.txt
            head -30 /tmp/results/fbshared_selectors.txt
          else
            echo "No FB frameworks found"
          fi

      - name: Upload results
        if: hashFiles('/tmp/results') != ''
        uses: actions/upload-artifact@v4
        with:
          name: fb-560-class-analysis
          path: /tmp/results/
